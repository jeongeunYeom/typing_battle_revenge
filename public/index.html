<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>복수혈전 영단어 대결</title>
  <link rel="stylesheet" href="/style.css" />
  <link href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@1.0/nanumsquare.css" rel="stylesheet">
</head>
<body>
  <div class="container" id="gameRoot">
    <h1>복수혈전 영단어 대결</h1>
    <p class="subtitle">맞히면 상대 화면에 방해물이 날아갑니다.</p>

    <section class="panel" id="lobbyPanel">
      <h2>로비</h2>
      <input id="nameInput" type="text" placeholder="닉네임" />
      <input id="roomInput" type="text" placeholder="방 코드 (예: ROOM1)" />
      <div class="buttonRow">
        <button id="createBtn">방 만들기</button>
        <button id="joinBtn">방 참가</button>
      </div>
      <p id="lobbyMessage" class="message"></p>
    </section>

    <section class="panel hidden" id="gamePanel">
      <div class="topBar">
        <div>
          <strong>방 코드:</strong> <span id="roomCodeText"></span>
        </div>
        <div>
          <strong>라운드:</strong> <span id="roundText">0</span>
        </div>
      </div>

      <div class="scoreBoard" id="scoreBoard"></div>

      <div class="questionBox" id="questionBox">
        <p class="label">뜻</p>
        <h2 id="clueText">상대를 기다리는 중...</h2>
      </div>

      <div class="typingBox" id="typingBox">
        <input id="answerInput" type="text" placeholder="정답 입력 (예: call off)" disabled />
        <button id="submitBtn" disabled>제출</button>
      </div>

      <div class="feedbackArea">
        <p id="feedbackText" class="message"></p>
        <p id="systemText" class="system"></p>
      </div>
    </section>

    <section class="panel hidden" id="resultPanel">
      <h2>게임 종료</h2>
      <p id="resultText"></p>
      <div id="finalScores"></div>
      <button onclick="location.reload()">다시 하기</button>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
